  /doel:
    get:
      operationId: doel_list
      description: Deze lijst kan gefilterd wordt met query-string parameters.
      summary: Alle doelen opvragen.
      parameters:
      - in: query
        name: doeltypeUuid
        schema:
          type: array
          items:
            type: string
            format: uuid
        description: UUID's van de gekoppelde doeltypen.
        explode: false
        style: form
      - in: query
        name: einddatum
        schema:
          type: string
          format: date-time
        description: Einddatum van het doel.
      - in: query
        name: einddatum__gte
        schema:
          type: string
          format: date-time
        description: Einddatum van het doel.
      - in: query
        name: einddatum__lte
        schema:
          type: string
          format: date-time
        description: Einddatum van het doel.
      - in: query
        name: hoofdDoelUuid
        schema:
          type: array
          items:
            type: string
            format: uuid
        description: UUID's van de bovenliggende doelen.
        explode: false
        style: form
      - name: page
        required: false
        in: query
        description: Een pagina binnen de gepagineerde set resultaten.
        schema:
          type: integer
      - name: pageSize
        required: false
        in: query
        description: 'Het aantal resultaten terug te geven per pagina. (default: 100).'
        schema:
          type: integer
      - in: query
        name: persoonUuid
        schema:
          type: array
          items:
            type: string
            format: uuid
        description: UUID's van de gekoppelde personen.
        explode: false
        style: form
      - in: query
        name: plannenUuids
        schema:
          type: array
          items:
            type: string
            format: uuid
        description: UUID's van de gekoppelde plannen.
        explode: false
        style: form
      - in: query
        name: resultaat
        schema:
          type: string
          enum:
          - behaald
          - gefaald
        description: |-
          Resultaat van het doel.

          * `behaald` - Behaald
          * `gefaald` - Gefaald
      - in: query
        name: startdatum
        schema:
          type: string
          format: date-time
        description: Startdatum van het doel.
      - in: query
        name: startdatum__gte
        schema:
          type: string
          format: date-time
        description: Startdatum van het doel.
      - in: query
        name: startdatum__lte
        schema:
          type: string
          format: date-time
        description: Startdatum van het doel.
      - in: query
        name: status
        schema:
          type: string
          enum:
          - actief
          - afgerond
          - geannuleerd
        description: |-
          Status van het doel.

          * `actief` - Actief
          * `afgerond` - Afgerond
          * `geannuleerd` - Geannuleerd
      - in: query
        name: status__in
        schema:
          type: array
          items:
            type: string
        description: Meerdere waarden kunnen gescheiden worden door komma's.
        explode: false
        style: form
      - in: query
        name: titel
        schema:
          type: string
        description: Titel van het doel.
      - in: query
        name: titel__icontains
        schema:
          type: string
        description: Titel van het doel.
      tags:
      - Doel
      security:
      - tokenAuth: []
      responses:
        '200':
          headers:
            API-version:
              schema:
                type: string
              description: 'Geeft een specifieke API-versie aan in de context van
                een specifieke aanroep. Voorbeeld: 1.2.1.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDoelList'
            application/problem+json:
              schema:
                $ref: '#/components/schemas/PaginatedDoelList'
          description: ''
    post:
      operationId: doel_create
      description: Voeg een nieuw doel toe aan het systeem.
      summary: Nieuw doel aanmaken.
      tags:
      - Doel
      requestBody:
        content:
