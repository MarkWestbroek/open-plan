components:
  schemas:
    Contactmoment:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
          description: Unieke resource identifier (UUID4) voor deze functie.
        plan:
          allOf:
          - $ref: '#/components/schemas/NestedPlan'
          readOnly: true
          description: Unieke resource identifier (UUID4) voor deze functie.
        planUuid:
          type: string
          format: uuid
          writeOnly: true
          description: UUID van het plan waarbij dit contactmoment hoort.
      required:
      - plan
      - planUuid
      - uuid
    Doel:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
          description: Unieke resource identifier (UUID4) voor deze functie.
        plan:
          allOf:
          - $ref: '#/components/schemas/NestedPlan'
          readOnly: true
          description: Unieke resource identifier (UUID4) voor deze functie.
        planUuid:
          type: string
          format: uuid
          writeOnly: true
          description: UUID van het plan waarbij dit doel hoort.
        doeltype:
          allOf:
          - $ref: '#/components/schemas/DoelType'
          readOnly: true
          description: De unieke naam van dit doeltype.
        doeltypeUuid:
          type: string
          format: uuid
          writeOnly: true
          description: UUID van de gekoppelde doeltype.
        persoon:
          allOf:
          - $ref: '#/components/schemas/Persoon'
          readOnly: true
          description: Unieke resource identifier (UUID4)
        persoonUuid:
          type: string
          format: uuid
          writeOnly: true
          description: UUID van de gekoppelde persoon.
        hoofdDoel:
          type: string
          format: uuid
          nullable: true
          description: UUID van de bovenliggende doel (optioneel).
      required:
      - doeltype
      - doeltypeUuid
      - persoon
      - persoonUuid
      - plan
      - planUuid
      - uuid
    DoelCategorie:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
          description: Unieke resource identifier (UUID4) voor deze categorie.
        naam:
          type: string
          description: Naam van de doelcategorie.
          maxLength: 200
      required:
      - naam
      - uuid
    DoelType:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
          description: Unieke resource identifier (UUID4) voor deze functie.
        type:
          allOf:
          - $ref: '#/components/schemas/DoelTypeTypeEnum'
          description: |-
            De unieke naam van dit doeltype.

            * `hoofddoel` - Hoofddoel
            * `subdoel` - Subdoel
            * `ontwikkelwens` - Ontwikkelwens
      required:
      - type
      - uuid
    DoelTypeTypeEnum:
      enum:
      - hoofddoel
      - subdoel
      - ontwikkelwens
      type: string
      description: |-
        * `hoofddoel` - Hoofddoel
        * `subdoel` - Subdoel
        * `ontwikkelwens` - Ontwikkelwens
    Instrument:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
          description: Unieke resource identifier (UUID4) voor deze functie.
        doel:
          allOf:
          - $ref: '#/components/schemas/NestedDoel'
          readOnly: true
          description: Unieke resource identifier (UUID4) voor deze functie.
        doelUuid:
          type: string
          format: uuid
          writeOnly: true
          description: UUID van het doel waaraan dit instrument gekoppeld is.
        instrumenttype:
          allOf:
          - $ref: '#/components/schemas/InstrumentType'
          readOnly: true
          description: Het type instrument.
        instrumenttypeUuid:
          type: string
          format: uuid
          writeOnly: true
          description: UUID van het type instrument dat hier wordt toegepast.
      required:
      - doel
      - doelUuid
      - instrumenttype
      - instrumenttypeUuid
      - uuid
    InstrumentType:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
          description: Unieke resource identifier (UUID4) voor deze functie.
        type:
          allOf:
          - $ref: '#/components/schemas/InstrumentTypeTypeEnum'
          description: |-
            Het type instrument.

            * `training` - Training
            * `coaching` - Coaching
            * `financiele_ondersteuning` - Financiele ondersteuning
      required:
      - type
      - uuid
    InstrumentTypeTypeEnum:
      enum:
      - training
      - coaching
      - financiele_ondersteuning
      type: string
      description: |-
        * `training` - Training
        * `coaching` - Coaching
        * `financiele_ondersteuning` - Financiele ondersteuning
    NestedDoel:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
          description: Unieke resource identifier (UUID4) voor deze functie.
        hoofdDoel:
          type: string
          format: uuid
          nullable: true
          description: UUID van de bovenliggende doel (optioneel).
      required:
      - uuid
    NestedPlan:
      type: object
